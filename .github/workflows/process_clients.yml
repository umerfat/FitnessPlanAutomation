name: Process New Clients

on:
  workflow_dispatch:
    inputs:
      client_name:
        description: "Client name to process"
        required: true
        type: string

permissions:
  contents: write

jobs:
  # ──────────────────────────────────────────────
  # PHASE 1: Generate plan → commit to plans/pending → email coach
  # ──────────────────────────────────────────────
  generate:
    runs-on: ubuntu-latest
    outputs:
      client_email: ${{ steps.process.outputs.client_email }}
      plan_filename: ${{ steps.commit.outputs.plan_filename }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write secrets to env
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
          COACH_EMAIL: ${{ secrets.COACH_EMAIL }}
        run: |
          cat > .env << EOF
          GEMINI_API_KEY=${GEMINI_API_KEY}
          GOOGLE_SHEET_ID=${GOOGLE_SHEET_ID}
          SHEET_NAME=ClientResponses
          SMTP_EMAIL=${SMTP_EMAIL}
          COACH_EMAIL=${COACH_EMAIL}
          BRAND_NAME=Umer Hurrah
          EOF
          echo "${GOOGLE_CREDENTIALS_JSON}" > credentials.json
          echo "${GOOGLE_TOKEN_JSON}" > token.json

      - name: Create directories
        run: mkdir -p output plans/pending

      - name: Generate plan and email coach
        id: process
        env:
          CI: "true"
        run: |
          python main.py --name "${{ inputs.client_name }}"

          # Get client email for phase 2
          CLIENT_EMAIL=$(python -c "
          from sheets_reader import get_client_by_name
          c = get_client_by_name('${{ inputs.client_name }}')
          print(c['Email'] if c else '')
          ")
          echo "client_email=${CLIENT_EMAIL}" >> $GITHUB_OUTPUT

      - name: Commit plan to staging area
        id: commit
        run: |
          SAFE_NAME=$(echo "${{ inputs.client_name }}" | tr ' /' '_')
          SRC="output/${SAFE_NAME}_plan.docx"
          DEST="plans/pending/${SAFE_NAME}_plan.docx"
          PLAN_FILENAME="${SAFE_NAME}_plan.docx"

          if [ -f "$SRC" ]; then
            cp "$SRC" "$DEST"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add "$DEST"
            git commit -m "📋 Plan ready for review: ${{ inputs.client_name }}"
            git push
            echo "plan_filename=${PLAN_FILENAME}" >> $GITHUB_OUTPUT
            echo "✅ Plan staged at ${DEST}"
          else
            echo "❌ No plan file found at ${SRC}"
            exit 1
          fi

      - name: Summary
        run: |
          echo "## 📋 Phase 1: Plan Generated & Staged" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Client:** ${{ inputs.client_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Email:** ${{ steps.process.outputs.client_email }}" >> $GITHUB_STEP_SUMMARY
          echo "**Plan:** \`plans/pending/${{ steps.commit.outputs.plan_filename }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next steps:" >> $GITHUB_STEP_SUMMARY
          echo "1. ✉️ Check your email for the plan to review" >> $GITHUB_STEP_SUMMARY
          echo "2. ✅ **Approve as-is:** Click Review deployments → Approve the \`send-to-client\` environment" >> $GITHUB_STEP_SUMMARY
          echo "3. 📝 **Edit first:** Download from email → edit → push the updated file to \`plans/pending/${{ steps.commit.outputs.plan_filename }}\` → then approve" >> $GITHUB_STEP_SUMMARY

  # ──────────────────────────────────────────────
  # PHASE 2: After approval → send plan → cleanup
  # ──────────────────────────────────────────────
  send-to-client:
    runs-on: ubuntu-latest
    needs: generate
    environment: send-to-client

    steps:
      - name: Checkout latest (includes any edits you pushed)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write secrets to env
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
          COACH_EMAIL: ${{ secrets.COACH_EMAIL }}
        run: |
          cat > .env << EOF
          GEMINI_API_KEY=${GEMINI_API_KEY}
          GOOGLE_SHEET_ID=${GOOGLE_SHEET_ID}
          SHEET_NAME=ClientResponses
          SMTP_EMAIL=${SMTP_EMAIL}
          COACH_EMAIL=${COACH_EMAIL}
          BRAND_NAME=Umer Hurrah
          EOF
          echo "${GOOGLE_CREDENTIALS_JSON}" > credentials.json
          echo "${GOOGLE_TOKEN_JSON}" > token.json

      - name: Verify plan exists
        run: |
          PLAN_PATH="plans/pending/${{ needs.generate.outputs.plan_filename }}"
          if [ ! -f "$PLAN_PATH" ]; then
            echo "❌ Plan not found at ${PLAN_PATH}"
            exit 1
          fi
          echo "✅ Found plan: ${PLAN_PATH}"

      - name: Send plan to client
        env:
          CI: "true"
        run: |
          PLAN_PATH="plans/pending/${{ needs.generate.outputs.plan_filename }}"
          CLIENT_EMAIL="${{ needs.generate.outputs.client_email }}"

          echo "Sending ${PLAN_PATH} to ${CLIENT_EMAIL}..."

          python -c "
          from email_sender import send_plan_to_client
          send_plan_to_client('${{ inputs.client_name }}', '${CLIENT_EMAIL}', '${PLAN_PATH}')
          print('✅ Plan sent to client!')
          "

      - name: Cleanup — remove plan from repo
        run: |
          PLAN_PATH="plans/pending/${{ needs.generate.outputs.plan_filename }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git rm "$PLAN_PATH"

          # Remove plans/pending/ directory if empty
          if [ -z "$(ls -A plans/pending/ 2>/dev/null)" ]; then
            rmdir plans/pending/ 2>/dev/null || true
          fi

          git commit -m "🧹 Cleanup: plan sent to ${{ inputs.client_name }}"
          git push

      - name: Summary
        run: |
          echo "## ✅ Plan Sent & Cleaned Up" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Client:** ${{ inputs.client_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Email:** ${{ needs.generate.outputs.client_email }}" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** Delivered & removed from repo! 🎉" >> $GITHUB_STEP_SUMMARY
