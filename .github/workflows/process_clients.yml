name: Process New Clients

on:
  workflow_dispatch:
    inputs:
      client_name:
        description: "Client name to process"
        required: true
        type: string

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────
  # PHASE 1: Generate plan → upload artifact → email coach
  # ──────────────────────────────────────────────
  generate:
    runs-on: ubuntu-latest
    outputs:
      client_email: ${{ steps.process.outputs.client_email }}
      plan_filename: ${{ steps.process.outputs.plan_filename }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write secrets to env
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
          COACH_EMAIL: ${{ secrets.COACH_EMAIL }}
        run: |
          cat > .env << EOF
          GEMINI_API_KEY=${GEMINI_API_KEY}
          GOOGLE_SHEET_ID=${GOOGLE_SHEET_ID}
          SHEET_NAME=ClientResponses
          SMTP_EMAIL=${SMTP_EMAIL}
          COACH_EMAIL=${COACH_EMAIL}
          BRAND_NAME=Umer Hurrah
          EOF
          echo "${GOOGLE_CREDENTIALS_JSON}" > credentials.json
          echo "${GOOGLE_TOKEN_JSON}" > token.json

      - name: Create directories
        run: mkdir -p output

      - name: Generate plan and email coach
        id: process
        env:
          CI: "true"
        run: |
          python main.py --name "${{ inputs.client_name }}"

          SAFE_NAME=$(echo "${{ inputs.client_name }}" | tr ' /' '_')
          PLAN_FILE="${SAFE_NAME}_plan.docx"
          echo "plan_filename=${PLAN_FILE}" >> $GITHUB_OUTPUT

          # Get client email for phase 2
          CLIENT_EMAIL=$(python -c "
          from sheets_reader import get_client_by_name
          c = get_client_by_name('${{ inputs.client_name }}')
          print(c['Email'] if c else '')
          ")
          echo "client_email=${CLIENT_EMAIL}" >> $GITHUB_OUTPUT

      - name: Upload plan as artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-plan
          path: output/${{ steps.process.outputs.plan_filename }}
          retention-days: 30

      - name: Summary
        run: |
          echo "## 📋 Phase 1: Plan Generated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Client:** ${{ inputs.client_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Email:** ${{ steps.process.outputs.client_email }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next steps:" >> $GITHUB_STEP_SUMMARY
          echo "1. ✉️ Check your email for the plan to review" >> $GITHUB_STEP_SUMMARY
          echo "2. ✅ **No edits needed?** Approve the **send-to-client** job below" >> $GITHUB_STEP_SUMMARY
          echo "3. 📝 **Edits needed?** Download the plan from email, edit it, then use the **Send Edited Plan** workflow to upload and send" >> $GITHUB_STEP_SUMMARY

  # ──────────────────────────────────────────────
  # PHASE 2: After approval → send plan to client
  # ──────────────────────────────────────────────
  send-to-client:
    runs-on: ubuntu-latest
    needs: generate
    environment: send-to-client

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: client-plan
          path: plan-to-send/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write secrets to env
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
          COACH_EMAIL: ${{ secrets.COACH_EMAIL }}
        run: |
          cat > .env << EOF
          GEMINI_API_KEY=${GEMINI_API_KEY}
          GOOGLE_SHEET_ID=${GOOGLE_SHEET_ID}
          SHEET_NAME=ClientResponses
          SMTP_EMAIL=${SMTP_EMAIL}
          COACH_EMAIL=${COACH_EMAIL}
          BRAND_NAME=Umer Hurrah
          EOF
          echo "${GOOGLE_CREDENTIALS_JSON}" > credentials.json
          echo "${GOOGLE_TOKEN_JSON}" > token.json

      - name: Send plan to client
        env:
          CI: "true"
        run: |
          PLAN_FILE="${{ needs.generate.outputs.plan_filename }}"
          CLIENT_EMAIL="${{ needs.generate.outputs.client_email }}"
          PLAN_PATH="plan-to-send/${PLAN_FILE}"

          echo "Sending ${PLAN_PATH} to ${CLIENT_EMAIL}..."

          python -c "
          from email_sender import send_plan_to_client
          send_plan_to_client('${{ inputs.client_name }}', '${CLIENT_EMAIL}', '${PLAN_PATH}')
          print('✅ Plan sent to client!')
          "

      - name: Summary
        run: |
          echo "## ✅ Phase 2: Plan Sent to Client" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Client:** ${{ inputs.client_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Email:** ${{ needs.generate.outputs.client_email }}" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** Delivered! 🎉" >> $GITHUB_STEP_SUMMARY
