name: Process New Clients

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Processing mode: new = only unprocessed, all = everyone"
        required: true
        default: "new"
        type: choice
        options:
          - new
          - all
      client_name:
        description: "Specific client name (leave empty to process all new)"
        required: false
        type: string
      send_to_client:
        description: "Also send plan directly to client (skip coach review)"
        required: false
        default: false
        type: boolean

jobs:
  generate-plans:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write secrets to env
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
          COACH_EMAIL: ${{ secrets.COACH_EMAIL }}
        run: |
          # Create .env file from secrets
          cat > .env << EOF
          GEMINI_API_KEY=${GEMINI_API_KEY}
          GOOGLE_SHEET_ID=${GOOGLE_SHEET_ID}
          SHEET_NAME=ClientResponses
          SMTP_EMAIL=${SMTP_EMAIL}
          COACH_EMAIL=${COACH_EMAIL}
          BRAND_NAME=Umer Hurrah
          EOF

          # Write Google credentials files from secrets
          echo "${GOOGLE_CREDENTIALS_JSON}" > credentials.json
          echo "${GOOGLE_TOKEN_JSON}" > token.json

      - name: Create output directory
        run: mkdir -p output

      - name: Restore processed clients tracking
        uses: actions/cache@v4
        with:
          path: processed_clients.json
          key: processed-clients-${{ github.run_id }}
          restore-keys: |
            processed-clients-

      - name: Process clients
        env:
          CI: "true"
        run: |
          if [ -n "${{ inputs.client_name }}" ]; then
            echo "Processing specific client: ${{ inputs.client_name }}"
            python main.py --name "${{ inputs.client_name }}"
          elif [ "${{ inputs.mode }}" = "all" ]; then
            echo "Processing all clients..."
            python main.py --all
          else
            echo "Processing new clients only..."
            python main.py
          fi

      - name: Send to client (if requested)
        if: inputs.send_to_client && inputs.client_name != ''
        env:
          CI: "true"
        run: |
          python -c "
          from sheets_reader import get_client_by_name
          from email_sender import send_plan_to_client
          import glob, os
          client = get_client_by_name('${{ inputs.client_name }}')
          if client:
              name = client['Full Name']
              email = client['Email']
              safe = name.replace(' ', '_').replace('/', '_')
              files = glob.glob(f'output/{safe}_plan.docx')
              if files:
                  send_plan_to_client(name, email, files[0])
                  print(f'Sent to {email}')
              else:
                  print('No plan file found')
          else:
              print('Client not found')
          "

      - name: Upload generated plans
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fitness-plans-${{ github.run_number }}
          path: output/*.docx
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          echo "## Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if ls output/*.docx 1>/dev/null 2>&1; then
            echo "### Generated Plans:" >> $GITHUB_STEP_SUMMARY
            for f in output/*.docx; do
              echo "- ✅ $(basename $f)" >> $GITHUB_STEP_SUMMARY
            done
          else
            echo "No plans generated." >> $GITHUB_STEP_SUMMARY
          fi
