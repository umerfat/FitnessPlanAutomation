name: Process New Clients

on:
  workflow_dispatch:
    inputs:
      client_name:
        description: "Client name to process"
        required: true
        type: string

# Need write permission to commit plans to repo
permissions:
  contents: write

jobs:
  # ──────────────────────────────────────────────
  # PHASE 1: Generate plan → commit to repo → email coach
  # ──────────────────────────────────────────────
  generate:
    runs-on: ubuntu-latest
    outputs:
      plan_path: ${{ steps.commit.outputs.plan_path }}
      client_email: ${{ steps.process.outputs.client_email }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write secrets to env
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
          COACH_EMAIL: ${{ secrets.COACH_EMAIL }}
        run: |
          cat > .env << EOF
          GEMINI_API_KEY=${GEMINI_API_KEY}
          GOOGLE_SHEET_ID=${GOOGLE_SHEET_ID}
          SHEET_NAME=ClientResponses
          SMTP_EMAIL=${SMTP_EMAIL}
          COACH_EMAIL=${COACH_EMAIL}
          BRAND_NAME=Umer Hurrah
          EOF
          echo "${GOOGLE_CREDENTIALS_JSON}" > credentials.json
          echo "${GOOGLE_TOKEN_JSON}" > token.json

      - name: Create directories
        run: mkdir -p output plans/pending

      - name: Generate plan and email coach
        id: process
        env:
          CI: "true"
        run: |
          python main.py --name "${{ inputs.client_name }}"

          # Get client email for phase 2
          CLIENT_EMAIL=$(python -c "
          from sheets_reader import get_client_by_name
          c = get_client_by_name('${{ inputs.client_name }}')
          print(c['Email'] if c else '')
          ")
          echo "client_email=${CLIENT_EMAIL}" >> $GITHUB_OUTPUT

      - name: Commit plan to repo for review
        id: commit
        run: |
          # Copy generated doc to plans/pending/
          SAFE_NAME=$(echo "${{ inputs.client_name }}" | tr ' /' '_')
          SRC="output/${SAFE_NAME}_plan.docx"
          DEST="plans/pending/${SAFE_NAME}_plan.docx"

          if [ -f "$SRC" ]; then
            cp "$SRC" "$DEST"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add "$DEST"
            git commit -m "📋 Plan ready for review: ${{ inputs.client_name }}"
            git push
            echo "plan_path=${DEST}" >> $GITHUB_OUTPUT
            echo "✅ Plan committed to ${DEST}"
          else
            echo "❌ No plan file found at ${SRC}"
            exit 1
          fi

      - name: Summary
        run: |
          echo "## 📋 Phase 1: Plan Generated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Client:** ${{ inputs.client_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Email:** ${{ steps.process.outputs.client_email }}" >> $GITHUB_STEP_SUMMARY
          echo "**Plan:** \`${{ steps.commit.outputs.plan_path }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next steps:" >> $GITHUB_STEP_SUMMARY
          echo "1. ✉️ Check your email for the plan" >> $GITHUB_STEP_SUMMARY
          echo "2. 📝 If edits needed: update the file at \`${{ steps.commit.outputs.plan_path }}\` and push" >> $GITHUB_STEP_SUMMARY
          echo "3. ✅ Approve the **send-to-client** job below to email the plan to the client" >> $GITHUB_STEP_SUMMARY

  # ──────────────────────────────────────────────
  # PHASE 2: After approval → send plan to client
  # ──────────────────────────────────────────────
  send-to-client:
    runs-on: ubuntu-latest
    needs: generate
    environment: send-to-client

    steps:
      - name: Checkout latest code (includes any edits you pushed)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write secrets to env
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
          COACH_EMAIL: ${{ secrets.COACH_EMAIL }}
        run: |
          cat > .env << EOF
          GEMINI_API_KEY=${GEMINI_API_KEY}
          GOOGLE_SHEET_ID=${GOOGLE_SHEET_ID}
          SHEET_NAME=ClientResponses
          SMTP_EMAIL=${SMTP_EMAIL}
          COACH_EMAIL=${COACH_EMAIL}
          BRAND_NAME=Umer Hurrah
          EOF
          echo "${GOOGLE_CREDENTIALS_JSON}" > credentials.json
          echo "${GOOGLE_TOKEN_JSON}" > token.json

      - name: Send plan to client
        env:
          CI: "true"
        run: |
          PLAN_PATH="${{ needs.generate.outputs.plan_path }}"
          CLIENT_EMAIL="${{ needs.generate.outputs.client_email }}"

          echo "Sending ${PLAN_PATH} to ${CLIENT_EMAIL}..."

          python -c "
          from email_sender import send_plan_to_client
          send_plan_to_client('${{ inputs.client_name }}', '${CLIENT_EMAIL}', '${PLAN_PATH}')
          print('✅ Plan sent to client!')
          "

      - name: Move plan to sent folder
        run: |
          PLAN_PATH="${{ needs.generate.outputs.plan_path }}"
          SAFE_NAME=$(echo "${{ inputs.client_name }}" | tr ' /' '_')
          mkdir -p plans/sent

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git mv "$PLAN_PATH" "plans/sent/${SAFE_NAME}_plan.docx"
          git commit -m "✅ Plan sent to client: ${{ inputs.client_name }}"
          git push

      - name: Summary
        run: |
          echo "## ✅ Phase 2: Plan Sent to Client" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Client:** ${{ inputs.client_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Email:** ${{ needs.generate.outputs.client_email }}" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** Delivered! 🎉" >> $GITHUB_STEP_SUMMARY
