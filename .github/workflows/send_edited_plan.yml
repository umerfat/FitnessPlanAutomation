name: Send Edited Plan

on:
  workflow_dispatch:
    inputs:
      client_name:
        description: "Client name (must match Google Sheet)"
        required: true
        type: string
      client_email:
        description: "Client email (leave blank to auto-lookup from sheet)"
        required: false
        type: string
      file_url:
        description: "Direct download URL for the edited .docx (Google Drive, Dropbox, etc.)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  send:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write secrets to env
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
          COACH_EMAIL: ${{ secrets.COACH_EMAIL }}
        run: |
          cat > .env << EOF
          GEMINI_API_KEY=${GEMINI_API_KEY}
          GOOGLE_SHEET_ID=${GOOGLE_SHEET_ID}
          SHEET_NAME=ClientResponses
          SMTP_EMAIL=${SMTP_EMAIL}
          COACH_EMAIL=${COACH_EMAIL}
          BRAND_NAME=Umer Hurrah
          EOF
          echo "${GOOGLE_CREDENTIALS_JSON}" > credentials.json
          echo "${GOOGLE_TOKEN_JSON}" > token.json

      - name: Download edited plan
        run: |
          SAFE_NAME=$(echo "${{ inputs.client_name }}" | tr ' /' '_')
          FILE_URL="${{ inputs.file_url }}"

          # Handle Google Drive share links → convert to direct download
          if echo "$FILE_URL" | grep -q "drive.google.com"; then
            FILE_ID=$(echo "$FILE_URL" | grep -oP '(?<=/d/|id=)[a-zA-Z0-9_-]+')
            FILE_URL="https://drive.google.com/uc?export=download&id=${FILE_ID}"
          fi

          # Handle Dropbox links → force direct download
          if echo "$FILE_URL" | grep -q "dropbox.com"; then
            FILE_URL=$(echo "$FILE_URL" | sed 's/dl=0/dl=1/')
          fi

          mkdir -p plan-to-send
          curl -L -o "plan-to-send/${SAFE_NAME}_plan.docx" "$FILE_URL"

          if [ ! -s "plan-to-send/${SAFE_NAME}_plan.docx" ]; then
            echo "❌ Failed to download file from: ${{ inputs.file_url }}"
            exit 1
          fi
          echo "✅ Downloaded edited plan"

      - name: Resolve client email
        id: resolve
        env:
          CI: "true"
        run: |
          INPUT_EMAIL="${{ inputs.client_email }}"
          if [ -n "$INPUT_EMAIL" ]; then
            echo "client_email=${INPUT_EMAIL}" >> $GITHUB_OUTPUT
          else
            CLIENT_EMAIL=$(python -c "
          from sheets_reader import get_client_by_name
          c = get_client_by_name('${{ inputs.client_name }}')
          print(c['Email'] if c else '')
          ")
            if [ -z "$CLIENT_EMAIL" ]; then
              echo "❌ Could not find email for '${{ inputs.client_name }}'. Provide it via the client_email input."
              exit 1
            fi
            echo "client_email=${CLIENT_EMAIL}" >> $GITHUB_OUTPUT
          fi

      - name: Send plan to client
        env:
          CI: "true"
        run: |
          SAFE_NAME=$(echo "${{ inputs.client_name }}" | tr ' /' '_')
          PLAN_PATH="plan-to-send/${SAFE_NAME}_plan.docx"
          CLIENT_EMAIL="${{ steps.resolve.outputs.client_email }}"

          echo "Sending ${PLAN_PATH} to ${CLIENT_EMAIL}..."

          python -c "
          from email_sender import send_plan_to_client
          send_plan_to_client('${{ inputs.client_name }}', '${CLIENT_EMAIL}', '${PLAN_PATH}')
          print('✅ Plan sent to client!')
          "

      - name: Summary
        run: |
          echo "## ✅ Edited Plan Sent to Client" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Client:** ${{ inputs.client_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Email:** ${{ steps.resolve.outputs.client_email }}" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** Delivered! 🎉" >> $GITHUB_STEP_SUMMARY
